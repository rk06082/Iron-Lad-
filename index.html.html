<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0B0D10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>IRON LOG</title>
<style>
:root{
  --bg:#0B0D10;--bg2:#101318;--card:#15181E;--card2:#1B1F27;--line:#262B34;--line2:#333A46;
  --or:#FF6A13;--or2:#FF3D00;--amber:#FFC46B;--ch:#F2F1EA;--gr:#7E8593;--gr2:#565D6B;--gn:#3EE08A;--rd:#FF5C5C;--cy:#53D8FF;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;}
html{background:var(--bg);}
body{background:
  radial-gradient(1200px 500px at 50% -200px, rgba(255,106,19,0.07), transparent 60%),
  repeating-linear-gradient(0deg, transparent 0 39px, rgba(255,255,255,0.015) 39px 40px),
  repeating-linear-gradient(90deg, transparent 0 39px, rgba(255,255,255,0.015) 39px 40px),
  var(--bg);
  color:var(--ch);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding-bottom:92px;min-height:100vh;}
.disp{font-weight:800;letter-spacing:.06em;text-transform:uppercase;}
.mono{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-variant-numeric:tabular-nums;}
.dim{color:var(--gr);}

header{padding:18px 18px 0;}
.brand{display:flex;align-items:center;justify-content:space-between;}
.brand .logo{display:flex;align-items:center;gap:9px;}
.logo-mark{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--or),var(--or2));display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 12px rgba(255,90,10,.45);}
.streakchip{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--line2);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;}

.row{display:flex;align-items:center;justify-content:space-between;}
.card{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:16px;padding:15px;margin:0 16px;box-shadow:0 8px 24px rgba(0,0,0,.35);}
.card+.card{margin-top:11px;}
h3{font-size:10.5px;color:var(--gr);text-transform:uppercase;letter-spacing:.14em;font-weight:800;margin-bottom:10px;}
section{padding-top:13px;display:flex;flex-direction:column;gap:11px;}
@keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.card{animation:rise .28s cubic-bezier(.2,.7,.3,1) both;}
.card:nth-child(2){animation-delay:.04s}.card:nth-child(3){animation-delay:.08s}.card:nth-child(4){animation-delay:.12s}.card:nth-child(5){animation-delay:.16s}

/* mission ring */
.ringwrap{display:flex;gap:16px;align-items:center;}
.ringbox{position:relative;width:132px;height:132px;flex:0 0 auto;}
.ringbox svg{transform:rotate(-90deg);}
.ringcenter{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ringcenter .big{font-size:26px;font-weight:800;letter-spacing:-.02em;}
.ringcenter .sml{font-size:9px;color:var(--gr);text-transform:uppercase;letter-spacing:.1em;margin-top:2px;}
.verdict{border-radius:12px;padding:9px 12px;font-size:12px;font-weight:700;line-height:1.45;}
.verdict.on{background:rgba(62,224,138,.09);border:1px solid rgba(62,224,138,.35);color:var(--gn);}
.verdict.off{background:rgba(255,92,92,.08);border:1px solid rgba(255,92,92,.35);color:var(--rd);}
.verdict.neut{background:rgba(83,216,255,.07);border:1px solid rgba(83,216,255,.3);color:var(--cy);}
.kv{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;}
.kv>div{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:9px 6px;text-align:center;}
.kv .v{font-size:15px;font-weight:800;}
.kv .l{font-size:8.5px;color:var(--gr);text-transform:uppercase;letter-spacing:.1em;margin-top:3px;}

/* goal setup */
.ginput{display:flex;flex-direction:column;gap:4px;flex:1;}
.ginput label{font-size:9.5px;color:var(--gr);text-transform:uppercase;letter-spacing:.1em;font-weight:700;}
input{background:var(--bg2);border:1px solid var(--line2);border-radius:10px;color:var(--ch);font-size:15px;padding:10px;width:100%;font-family:ui-monospace,Menlo,monospace;outline:none;}
input:focus{border-color:var(--or);}
input::placeholder{color:var(--gr2);}
.btn{background:linear-gradient(135deg,var(--or),var(--or2));border:none;border-radius:11px;color:#0A0C0E;font-size:13px;font-weight:800;padding:12px;width:100%;letter-spacing:.06em;text-transform:uppercase;box-shadow:0 4px 16px rgba(255,90,10,.35);}
.btn:active{transform:scale(.98);}
.btn.ghost{background:var(--bg2);color:var(--gr);border:1px solid var(--line2);box-shadow:none;}

/* milestones */
.mile{display:flex;gap:9px;overflow-x:auto;padding:2px;}
.mile::-webkit-scrollbar{display:none;}
.badge{flex:0 0 76px;background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:10px 6px;text-align:center;opacity:.38;filter:grayscale(.9);}
.badge.won{opacity:1;filter:none;border-color:rgba(255,106,19,.5);box-shadow:0 0 14px rgba(255,106,19,.14) inset;}
.badge .ic{font-size:21px;}
.badge .nm{font-size:8.5px;color:var(--gr);margin-top:5px;line-height:1.3;text-transform:uppercase;letter-spacing:.05em;font-weight:700;}
.badge.won .nm{color:var(--ch);}

/* train */
.tabs{display:flex;gap:7px;overflow-x:auto;padding:13px 16px 0;}
.tabs::-webkit-scrollbar{display:none;}
.daybtn{flex:0 0 auto;padding:9px 15px;border-radius:11px;border:1px solid var(--line2);background:var(--card);color:var(--gr);font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;}
.daybtn.on{border-color:transparent;background:linear-gradient(135deg,var(--or),var(--or2));color:#0A0C0E;box-shadow:0 3px 14px rgba(255,90,10,.4);}
.setrow{display:flex;align-items:center;gap:8px;margin-top:8px;}
.setrow input{width:64px;padding:8px;font-size:13.5px;border-radius:9px;}
.chk{margin-left:auto;width:34px;height:34px;border-radius:10px;border:1.5px solid var(--line2);background:transparent;color:var(--gr2);font-size:16px;display:flex;align-items:center;justify-content:center;}
.chk.on{background:linear-gradient(135deg,var(--gn),#22B86B);border-color:transparent;color:#052B17;font-weight:900;animation:pop .28s cubic-bezier(.2,1.6,.4,1);box-shadow:0 2px 10px rgba(62,224,138,.35);}
@keyframes pop{0%{transform:scale(.4) rotate(-14deg);}70%{transform:scale(1.2);}100%{transform:scale(1);}}
.lastline{display:flex;justify-content:space-between;align-items:center;margin-top:5px;font-size:10.5px;color:var(--gr);}
.copybtn{border:1px solid var(--line2);border-radius:7px;background:var(--bg2);color:var(--amber);font-size:10px;font-weight:700;padding:4px 10px;}
.exname{background:none;border:none;color:var(--ch);font-size:14px;font-weight:700;padding:0;text-align:left;}
.prbadge{display:inline-block;background:linear-gradient(135deg,var(--or),var(--or2));color:#0A0C0E;font-size:8.5px;font-weight:900;border-radius:5px;padding:2px 7px;margin-left:7px;vertical-align:middle;letter-spacing:.08em;}
@keyframes prflash{0%,100%{box-shadow:0 8px 24px rgba(0,0,0,.35);}50%{box-shadow:0 0 26px rgba(255,106,19,.55);}}
.pr{animation:prflash 1s ease 2;border-color:var(--or)!important;}
.bar{height:7px;background:var(--bg2);border-radius:4px;overflow:hidden;margin-top:8px;}
.bar>div{height:100%;background:linear-gradient(90deg,var(--or),var(--or2));transition:width .35s cubic-bezier(.2,.7,.3,1);border-radius:4px;}
.bar>div.full{background:linear-gradient(90deg,var(--gn),#22B86B);}

/* fuel */
.cnt{display:flex;align-items:center;gap:11px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 11px;}
.cnt+.cnt{margin-top:8px;}
.cnt button{width:38px;height:38px;border-radius:11px;border:1px solid var(--line2);background:var(--card);color:var(--ch);font-size:18px;font-weight:800;flex:0 0 auto;}
.cnt .plusbtn{background:linear-gradient(135deg,var(--or),var(--or2));color:#0A0C0E;border:none;box-shadow:0 2px 10px rgba(255,90,10,.35);}
.cnt button:active{transform:scale(.93);}

/* weeks */
.navwk{background:var(--card);border:1px solid var(--line2);border-radius:10px;color:var(--ch);padding:7px 13px;font-size:16px;}
.navwk:disabled{opacity:.3;}
.weekday{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-bottom:1px solid var(--line);font-size:12.5px;}
.weekday:last-child{border-bottom:none;}
.stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin:0 16px;}
.stat3>div{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:14px;padding:12px 6px;text-align:center;}
.stat3 .v{font-size:18px;font-weight:800;}
.stat3 .l{font-size:8.5px;color:var(--gr);margin-top:3px;text-transform:uppercase;letter-spacing:.1em;}

canvas{width:100%;display:block;}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:99;}
.pill{position:fixed;bottom:86px;right:16px;background:linear-gradient(135deg,var(--or),var(--or2));color:#0A0C0E;border:none;border-radius:22px;padding:11px 17px;font-size:15px;font-weight:900;z-index:40;box-shadow:0 6px 20px rgba(255,90,10,.5);font-family:ui-monospace,Menlo,monospace;}
.flash{position:fixed;bottom:86px;left:16px;right:96px;background:var(--card2);border:1px solid rgba(62,224,138,.5);border-radius:12px;padding:10px 13px;font-size:12px;font-weight:700;color:var(--gn);text-align:center;z-index:30;animation:rise .25s ease;}

nav{position:fixed;bottom:0;left:0;right:0;background:rgba(16,19,24,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);}
nav button{flex:1;background:none;border:none;padding:11px 0 13px;color:var(--gr2);font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;display:flex;flex-direction:column;align-items:center;gap:4px;}
nav button.on{color:var(--or);}
nav .ico{font-size:19px;}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo"><div class="logo-mark">⚡</div><span class="disp" style="font-size:17px;">Iron&nbsp;Log</span></div>
    <div class="streakchip">🔥 <span id="streak">0</span><span class="dim" style="font-weight:600;">&nbsp;day</span></div>
  </div>
</header>

<div id="view"></div>

<canvas id="confetti"></canvas>
<button class="pill" id="timerPill" style="display:none;" onclick="stopTimer()">⏱ <span id="timerTxt"></span></button>
<div class="flash" id="flash" style="display:none;"></div>

<nav>
  <button id="nav-mission" onclick="go('mission')"><span class="ico">🎯</span>Mission</button>
  <button id="nav-train" onclick="go('train')"><span class="ico">🏋️</span>Train</button>
  <button id="nav-weeks" onclick="go('weeks')"><span class="ico">📅</span>Weeks</button>
  <button id="nav-body" onclick="go('body')"><span class="ico">📈</span>Body</button>
</nav>

<script>
// ================= PROGRAM =================
const PHASES=[
 {id:1,label:"PHASE 01",name:"Foundation",start:"2026-07-06",end:"2026-08-04"},
 {id:2,label:"PHASE 02",name:"Overload",start:"2026-08-05",end:"2026-09-21"},
];
const SPLIT={
 pushA:{label:"Push A",sub:"Heavy chest · Shoulders / Triceps + Abs",ex:[
  ["flatDb","Flat DB Press",4,"8–10","6–8 ↑kg"],["inclineMach","Incline Machine Press",3,"10–12","8–10"],
  ["cableFly","Cable Fly",3,"12–15","12–15 slow"],["seatedDbShoulder","Seated DB Shoulder Press",3,"8–10","8–10 ↑kg"],
  ["lateralRaiseA","Lateral Raise",3,"12–15","15–20"],["ropeTricep","Rope Tricep Pushdown",3,"12–15","10–12 ↑kg"],
  ["overheadTricep","Overhead Tricep Ext.",2,"10–12","10–12"],["cableCrunchA","Cable Crunch",4,"12–15","10–12 +wt"],
  ["hangKnee","Hanging Knee Raise",3,"15","12–15 +wt"],
 ]},
 pullA:{label:"Pull A",sub:"Back width · Biceps + Abs",ex:[
  ["latPulldown","Lat Pulldown (wide)",4,"10–12","8–10 ↑kg"],["straightArm","Straight-Arm Pulldown",3,"12–15","12–15 ↑kg"],
  ["singleArmRow","Single-Arm DB Row",3,"10–12","8–10 ↑kg"],["facePullA","Face Pull",3,"15","15"],
  ["barbellCurl","Barbell / EZ Curl",3,"10–12","8–10 ↑kg"],["hammerCurl","Hammer Curl",2,"12","10–12"],
  ["declineSitup","Weighted Decline Sit-up",3,"15","12–15 +wt"],
 ]},
 legsA:{label:"Legs A",sub:"Quad lead + Core + Arm finisher",ex:[
  ["legPress","Leg Press",4,"10–12","8–10 ↑kg"],["hackSquat","Hack / Goblet Squat",3,"10–12","8–10"],
  ["legExt","Leg Extension",3,"12–15","12–15"],["legCurlA","Seated Leg Curl",3,"10–12","10–12 ↑kg"],
  ["calfRaiseA","Standing Calf Raise",4,"15","15–20"],["woodchop","Cable Woodchop",3,"12/side","12/side ↑kg"],
  ["plankA","Plank",3,"45–60s","60–75s"],["finCurlA","Finisher: Cable Curl",2,"12–15","12–15 ↑kg"],
  ["finTriA","Finisher: Rope Pushdown",2,"12–15","12–15 ↑kg"],
 ]},
 pushB:{label:"Push B",sub:"Shoulder lead · Chest / Triceps + Abs",ex:[
  ["arnoldPress","Arnold Press",4,"10","8–10 ↑kg"],["cableLateral","Cable Lateral Raise",4,"15","15–20"],
  ["inclineDb","Incline DB Press",4,"8–10","6–8 ↑kg"],["machineChest","Machine Chest Press",3,"12","10–12"],
  ["skullcrusher","Skullcrusher / EZ Ext.",3,"10–12","8–10 ↑kg"],["cableCrunchB","Cable Crunch",4,"15","10–12 +wt"],
  ["reverseCrunch","Reverse Crunch",3,"15","15–20"],
 ]},
 pullB:{label:"Pull B",sub:"Back thickness · Traps / Biceps + Abs",ex:[
  ["chestSupportedRow","Chest-Supported Row",4,"8–10","8–10 ↑kg"],["seatedCableRow","Seated Cable Row",3,"10–12","8–10"],
  ["pullup","Pull-up (assisted ok)",3,"8–10","6–8 less assist"],["rearDeltFly","Rear Delt Fly",3,"15","15"],
  ["shrug","DB / Barbell Shrug",3,"12–15","10–12 ↑kg"],["inclineCurl","Incline DB Curl",3,"12","10–12 ↑kg"],
  ["hangLegRaiseB","Hanging Leg Raise",3,"12–15","12–15 +wt"],
 ]},
 legsB:{label:"Legs B",sub:"Hams / glutes + Conditioning + Arm finisher",ex:[
  ["rdl","DB RDL (light, strict)",3,"10–12 light","+2.5kg if pain-free"],["legCurlB","Lying Leg Curl",4,"10–12","10–12 ↑kg"],
  ["legPressB","Leg Press (feet high)",3,"12–15","10–12"],["calfRaiseB","Seated Calf Raise",4,"15","15–20"],
  ["inclineWalk","Incline Walk",1,"30–40 min","35–45 min"],["windshield","Windshield Wipers",3,"10/side","10–12/side"],
  ["finCurlB","Finisher: DB Curl",2,"12–15","12–15 ↑kg"],["finTriB","Finisher: Overhead Ext.",2,"12–15","12–15 ↑kg"],
 ]},
};
const ORDER=["pushA","pullA","legsA","pushB","pullB","legsB"];
const START=PHASES[0].start, FINAL=PHASES[1].end;

// ================= STATE =================
const LS_LOG="ironlog.log",LS_STATS="ironlog.stats",LS_GOALS="ironlog.goals";
let log={},stats=[],goals=null;
try{log=JSON.parse(localStorage.getItem(LS_LOG)||"{}");}catch(e){log={};}
try{stats=JSON.parse(localStorage.getItem(LS_STATS)||"[]");}catch(e){stats=[];}
try{goals=JSON.parse(localStorage.getItem(LS_GOALS)||"null");}catch(e){goals=null;}
const saveLog=()=>localStorage.setItem(LS_LOG,JSON.stringify(log));
const saveStats=()=>localStorage.setItem(LS_STATS,JSON.stringify(stats));
const saveGoals=()=>localStorage.setItem(LS_GOALS,JSON.stringify(goals));

// ================= HELPERS =================
const pad=n=>String(n).padStart(2,"0");
const isoOf=d=>d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const TODAY=isoOf(new Date());
const addDays=(iso,n)=>{const d=new Date(iso+"T00:00:00");d.setDate(d.getDate()+n);return isoOf(d);};
const between=(a,b)=>Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/864e5);
const fmt=iso=>new Date(iso+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short"});
const fmtDay=iso=>new Date(iso+"T00:00:00").toLocaleDateString("en-GB",{weekday:"short"});
const phase=PHASES.find(p=>TODAY>=p.start&&TODAY<=p.end)||(TODAY<START?PHASES[0]:PHASES[1]);
const pKey=phase.id===1?3:4;
const wkIdx=iso=>Math.floor(between(START,iso)/7);
const wkStart=i=>addDays(START,i*7);
const TOTAL_WEEKS=wkIdx(FINAL)+1;
const hasWork=e=>e&&e.sets&&Object.values(e.sets).some(a=>a.some(s=>s.done));
const vol=s=>{const w=parseFloat(s.w),r=parseFloat(s.r);return isFinite(w)&&isFinite(r)?w*r:0;};
const esc=t=>String(t).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

let tab=goals?"mission":"mission", dayKey="pushA", openEx=null, weekView=Math.max(0,Math.min(TOTAL_WEEKS-1,wkIdx(TODAY)));
(function(){
  const t=log[TODAY];
  if(t&&t.dayKey&&SPLIT[t.dayKey]){dayKey=t.dayKey;return;}
  const dates=Object.keys(log).filter(d=>hasWork(log[d])).sort();
  const last=dates[dates.length-1];
  if(last&&log[last].dayKey){const i=ORDER.indexOf(log[last].dayKey);if(i>=0)dayKey=ORDER[(i+1)%ORDER.length];}
})();

function entryToday(){if(!log[TODAY])log[TODAY]={dayKey,sets:{}};log[TODAY].dayKey=log[TODAY].dayKey||dayKey;if(!log[TODAY].sets)log[TODAY].sets={};return log[TODAY];}
function getSets(exId,n){const e=log[TODAY];const a=(e&&e.sets&&e.sets[exId])?e.sets[exId]:[];const out=[];for(let i=0;i<n;i++)out.push(a[i]||{w:"",r:"",done:false});return out;}
function lastSession(exId){const ds=Object.keys(log).filter(d=>d<TODAY).sort().reverse();for(const d of ds){const e=log[d];if(e&&e.sets&&e.sets[exId]&&e.sets[exId].some(s=>s.done))return{date:d,sets:e.sets[exId].filter(s=>s.done)};}return null;}
function exHistory(exId){const out=[];Object.keys(log).sort().forEach(d=>{const e=log[d];if(e&&e.sets&&e.sets[exId]){const done=e.sets[exId].filter(s=>s.done&&parseFloat(s.w));if(done.length)out.push({d:fmt(d),v:Math.max(...done.map(s=>parseFloat(s.w)))});}});return out;}
function streak(){let n=0,d=hasWork(log[TODAY])?TODAY:addDays(TODAY,-1);while(hasWork(log[d])){n++;d=addDays(d,-1);}return n;}
function totalSessions(){return Object.keys(log).filter(d=>hasWork(log[d])).length;}
function weekSummary(i){const s=wkStart(i);let sessions=0,volume=0,setsDone=0;const days=[];
  for(let k=0;k<7;k++){const iso=addDays(s,k);const e=log[iso];const w=hasWork(e);let v=0;
    if(w){sessions++;Object.values(e.sets).forEach(a=>a.forEach(x=>{if(x.done){setsDone++;v+=vol(x);}}));}
    volume+=v;days.push({iso,worked:w,dayKey:e&&e.dayKey,v});}
  return{start:s,end:addDays(s,6),days,sessions,volume,setsDone};}

// ================= GOAL ENGINE =================
function latestWeight(){const w=stats.filter(s=>s.weight!=null);return w.length?w[w.length-1]:null;}
function firstWeight(){const w=stats.filter(s=>s.weight!=null);return w.length?w[0]:null;}
function actualPace(){ // kg per week from logged data
  const w=stats.filter(s=>s.weight!=null);
  if(w.length<2)return null;
  const a=w[0],b=w[w.length-1];
  const days=between(a.date,b.date);
  if(days<3)return null;
  return (b.weight-a.weight)/days*7;
}
function goalMath(){
  if(!goals)return null;
  const lw=latestWeight();
  const cur=lw?lw.weight:goals.startW;
  const g1=goals.g1,g2=goals.g2;
  const d1=Math.max(0,between(TODAY,PHASES[0].end)),d2=Math.max(0,between(TODAY,FINAL));
  const need1=d1>0?(cur-g1)/(d1/7):0;
  const need2=d2>0?(cur-g2)/(d2/7):0;
  const pace=actualPace(); // negative = losing
  const totalCut=goals.startW-g2;
  const done=goals.startW-cur;
  const pct=totalCut>0?Math.max(0,Math.min(100,done/totalCut*100)):0;
  let projDate=null;
  if(pace&&pace<-0.05){const wksLeft=(cur-g2)/(-pace);projDate=addDays(TODAY,Math.round(wksLeft*7));}
  return{cur,g1,g2,d1,d2,need1,need2,pace,pct,done,totalCut,projDate};
}
function setGoals(){
  const s=parseFloat(document.getElementById("gStart").value);
  const a=parseFloat(document.getElementById("gAug").value);
  const b=parseFloat(document.getElementById("gSep").value);
  const w=parseFloat(document.getElementById("gWaist").value);
  if(!isFinite(s)||!isFinite(a)||!isFinite(b)){flash("Fill start weight + both targets");return;}
  if(a>=s||b>=a){flash("Targets must go down: start > Aug 4 > Sept 21");return;}
  goals={startW:s,g1:a,g2:b,waist:isFinite(w)?w:null,setOn:TODAY};
  saveGoals();

}

function countPRs(){
  let n=0;const best={};
  Object.keys(log).sort().forEach(d=>{const e=log[d];if(!e||!e.sets)return;
    Object.keys(e.sets).forEach(ex=>{e.sets[ex].forEach(s=>{if(s.done){const w=parseFloat(s.w);if(isFinite(w)){if(best[ex]!=null&&w>best[ex])n++;if(best[ex]==null||w>best[ex])best[ex]=w;}}});});});
  return n;
}

// ================= CANVAS CHARTS =================
function lineChart(canvas,cfg){
  const dpr=window.devicePixelRatio||1;const W=canvas.clientWidth,H=canvas.clientHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;const ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  const series=cfg.series,labels=cfg.labels;
  const all=series.flatMap(s=>s.data).concat(cfg.hlines?cfg.hlines.map(h=>h.v):[]).filter(v=>v!=null&&isFinite(v));
  if(!all.length)return;
  let mn=Math.min(...all),mx=Math.max(...all);if(mn===mx){mn-=1;mx+=1;}
  const pd=(mx-mn)*.12;mn-=pd;mx+=pd;
  const padL=36,padR=8,padT=8,padB=18;
  const X=i=>padL+(labels.length<2?0:(W-padL-padR)*i/(labels.length-1));
  const Y=v=>padT+(H-padT-padB)*(1-(v-mn)/(mx-mn));
  ctx.strokeStyle="#262B34";ctx.fillStyle="#7E8593";ctx.font="9px ui-monospace,monospace";ctx.lineWidth=1;
  for(let g=0;g<=3;g++){const v=mn+(mx-mn)*g/3;const y=Y(v);ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();ctx.setLineDash([]);ctx.fillText(v>=100?Math.round(v):v.toFixed(1),2,y+3);}
  const step=Math.max(1,Math.ceil(labels.length/5));
  labels.forEach((l,i)=>{if(i%step===0)ctx.fillText(l,X(i)-10,H-4);});
  // horizontal goal lines
  (cfg.hlines||[]).forEach(h=>{const y=Y(h.v);ctx.strokeStyle=h.color;ctx.setLineDash([6,4]);ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=h.color;ctx.fillText(h.label,W-padR-58,y-4);});
  series.forEach(s=>{
    ctx.strokeStyle=s.color;ctx.lineWidth=2.2;
    if(s.dash)ctx.setLineDash([5,4]);
    ctx.beginPath();let st=false;
    s.data.forEach((v,i)=>{if(v==null||!isFinite(v))return;const x=X(i),y=Y(v);if(!st){ctx.moveTo(x,y);st=true;}else ctx.lineTo(x,y);});
    ctx.stroke();ctx.setLineDash([]);
    if(!s.dash){ctx.fillStyle=s.color;s.data.forEach((v,i)=>{if(v==null||!isFinite(v))return;ctx.beginPath();ctx.arc(X(i),Y(v),2.6,0,7);ctx.fill();});}
  });
}
function barChart(canvas,cfg){
  const dpr=window.devicePixelRatio||1;const W=canvas.clientWidth,H=canvas.clientHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;const ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  const data=cfg.data,labels=cfg.labels;
  const mx=Math.max(...data,1);const padL=36,padR=8,padT=8,padB=18;
  const bw=(W-padL-padR)/data.length;
  ctx.fillStyle="#7E8593";ctx.font="9px ui-monospace,monospace";ctx.strokeStyle="#262B34";
  for(let g=0;g<=3;g++){const y=padT+(H-padT-padB)*(1-g/3);ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();ctx.setLineDash([]);ctx.fillText(Math.round(mx*g/3).toLocaleString(),2,y+3);}
  data.forEach((v,i)=>{const h=(H-padT-padB)*v/mx;const x=padL+i*bw+bw*.15;
    const gr=ctx.createLinearGradient(0,H-padB-h,0,H-padB);gr.addColorStop(0,"#FF6A13");gr.addColorStop(1,"#FF3D00");
    ctx.fillStyle=gr;if(v>0){ctx.beginPath();ctx.roundRect?ctx.roundRect(x,H-padB-h,bw*.7,h,[3,3,0,0]):ctx.fillRect(x,H-padB-h,bw*.7,h);ctx.fill();}
    ctx.fillStyle="#7E8593";ctx.fillText(labels[i],padL+i*bw+bw*.2,H-4);});
}
function ring(el,pct,color){

  const pPct=Math.min(100,Math.round((f.protein||0)/195*100));
  h+='<div class="card"><h3>⚡ Today\'s fuel — tap to log</h3>';
  h+='<div class="cnt"><button onclick="bumpFuel(\'protein\',-10)">−</button><div style="flex:1;"><div class="row"><span style="font-size:12.5px;font-weight:700;">Protein</span><span class="mono" style="font-size:13.5px;font-weight:800;color:'+(pPct>=100?"var(--gn)":"var(--or)")+';">'+(f.protein||0)+' / 195g</span></div><div class="bar" style="margin-top:6px;"><div class="'+(pPct>=100?"full":"")+'" style="width:'+pPct+'%;"></div></div></div><button class="plusbtn" onclick="bumpFuel(\'protein\',10)">+</button></div>';
  h+='<div class="cnt"><button onclick="bumpFuel(\'water\',-1)">−</button><div style="flex:1;"><div class="row"><span style="font-size:12.5px;font-weight:700;">Water</span><span style="font-size:13px;">'+"💧".repeat(Math.min(f.water||0,8))+' <span class="mono" style="font-weight:800;color:var(--or);">'+(f.water||0)+'/8</span></span></div></div><button class="plusbtn" onclick="bumpFuel(\'water\',1)">+</button></div>';
  h+='</div></section>';
  return h;
}

function renderWeeks(){
  const wk=weekSummary(weekView);
  const prev=weekView>0?weekSummary(weekView-1):null;
  const delta=prev&&prev.volume>0?Math.round((wk.volume-prev.volume)/prev.volume*100):null;
  let h='<section>';
  h+='<div class="row" style="margin:0 16px;"><button class="navwk" onclick="moveWeek(-1)"'+(weekView===0?" disabled":"")+'>‹</button><div style="text-align:center;"><div class="disp" style="font-size:15px;">Week '+(weekView+1)+' <span style="color:var(--gr);font-size:11px;">/ '+TOTAL_WEEKS+'</span></div><div class="mono" style="font-size:10.5px;color:var(--gr);">'+fmt(wk.start)+' – '+fmt(wk.end)+'</div></div><button class="navwk" onclick="moveWeek(1)"'+(weekView>=TOTAL_WEEKS-1?" disabled":"")+'>›</button></div>';
  h+='<div class="stat3">';
  h+='<div><div class="v mono" style="color:'+(wk.sessions>=6?"var(--gn)":"var(--ch)")+';">'+wk.sessions+'/6</div><div class="l">Sessions</div></div>';
  h+='<div><div class="v mono">'+wk.setsDone+'</div><div class="l">Sets</div></div>';
  h+='<div><div class="v mono" style="color:var(--or);">'+Math.round(wk.volume).toLocaleString()+'</div><div class="l">Volume kg</div></div></div>';
  if(delta!==null)h+='<div class="mono" style="font-size:11.5px;text-align:center;color:'+(delta>=0?"var(--gn)":"var(--rd)")+';font-weight:700;">'+(delta>=0?"▲":"▼")+' '+Math.abs(delta)+'% vs Week '+weekView+' — '+(delta>=0?"overload achieved":"down week: sleep, food, effort — check all three")+'</div>';
  h+='<div class="card" style="padding:0;overflow:hidden;">';
  wk.days.forEach(d=>{const fut=d.iso>TODAY;
    h+='<div class="weekday" style="opacity:'+(fut?.42:1)+';"><div style="display:flex;gap:10px;align-items:center;"><span class="mono" style="font-size:11px;color:'+(d.iso===TODAY?"var(--or)":"var(--gr)")+';width:66px;font-weight:700;">'+fmtDay(d.iso)+' '+fmt(d.iso)+'</span><span style="color:'+(d.worked?"var(--ch)":"var(--gr2)")+';font-weight:'+(d.worked?"700":"400")+';">'+(d.worked?(SPLIT[d.dayKey]?SPLIT[d.dayKey].label:"Workout"):(fut?"—":"Rest / missed"))+'</span></div>'+(d.worked?'<span class="mono" style="font-size:11px;color:var(--or);font-weight:700;">'+Math.round(d.v).toLocaleString()+' kg</span>':"")+'</div>';});
  h+='</div>';
  const upto=Math.min(TOTAL_WEEKS,Math.max(1,wkIdx(TODAY)+1));
  const bars=[],labs=[];
  for(let i=0;i<upto;i++){bars.push(Math.round(weekSummary(i).volume));labs.push("W"+(i+1));}
  h+='<div class="card"><h3>📊 Volume by week</h3>';
  if(bars.some(b=>b>0)){const cfg={type:"bar",data:bars,labels:labs};h+='<canvas data-chart=\''+JSON.stringify(cfg)+'\' style="height:130px;"></canvas>';}
  else h+='<div style="color:var(--gr);font-size:11.5px;text-align:center;padding:14px 0;">Log weights on sets and weekly volume shows here. Rule: each week ≥ the last.</div>';
  h+='</div></section>';
  return h;
}

function renderBody(){
  const withW=stats.filter(s=>s.weight!=null);
  const first=withW[0],last=withW[withW.length-1];
  const change=first&&last&&first!==last?(last.weight-first.weight):null;
  const g=goalMath();
  let h='<section>';
  h+='<div class="stat3" style="grid-template-columns:1fr 1fr;">';
  h+='<div><div class="v mono">'+(last?last.weight+" kg":"—")+'</div><div class="l">Current</div></div>';
  h+='<div><div class="v mono" style="color:'+(change==null?"var(--ch)":(change<=0?"var(--gn)":"var(--rd)"))+';">'+(change==null?"—":(change>0?"+":"")+change.toFixed(1)+" kg")+'</div><div class="l">Change</div></div></div>';
  h+='<div class="card">';
  if(stats.length>1){
    const hl=g?[{v:g.g1,color:"rgba(255,196,107,.8)",label:"AUG "+g.g1},{v:g.g2,color:"rgba(62,224,138,.8)",label:"SEP "+g.g2}]:[];
    const cfg={type:"line",labels:stats.map(s=>fmt(s.date)),series:[{color:"#FF6A13",data:stats.map(s=>s.weight??null)},{color:"#3EE08A",data:stats.map(s=>s.waist??null)}],hlines:hl};
    h+='<canvas data-chart=\''+JSON.stringify(cfg)+'\' style="height:155px;"></canvas><div style="font-size:9.5px;color:var(--gr);text-align:center;margin-top:5px;"><span style="color:var(--or);">●</span> weight kg &nbsp; <span style="color:var(--gn);">●</span> waist cm</div>';
  }else h+='<div style="color:var(--gr);font-size:12px;text-align:center;padding:16px 0;">Log weight + waist every 3–4 days, same time of day. The trend line is the truth — single weigh-ins lie.</div>';
  h+='<div style="display:flex;gap:9px;margin-top:13px;"><input id="inW" type="number" inputmode="decimal" placeholder="Weight kg" style="flex:1;width:auto;"><input id="inC" type="number" inputmode="decimal" placeholder="Waist cm" style="flex:1;width:auto;"><button class="btn" style="width:52px;padding:10px;font-size:19px;" onclick="addStat()">+</button></div></div>';
  h+='<div class="card"><h3>Daily targets</h3><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;text-align:center;">';
  [["2,200","kcal"],["195g","protein"],["205g","carbs"],["65g","fat"]].forEach(x=>{h+='<div style="background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:9px 4px;"><div class="mono" style="font-size:14px;font-weight:800;color:var(--or);">'+x[0]+'</div><div style="font-size:9px;color:var(--gr);margin-top:2px;text-transform:uppercase;letter-spacing:.08em;">'+x[1]+'</div></div>';});
  h+='</div><div style="font-size:11px;color:var(--gr);margin-top:11px;line-height:1.6;">Target: 0.5–0.7 kg/week down. Stalled 2 weeks → cut 100–150 kcal from carbs. Sessions flat 2+ days → add a little back. The Mission tab verdict is computed from exactly this data.</div></div>';
  h+='</section>';
  return h;
}

render();
</script>
</body>
</html>
